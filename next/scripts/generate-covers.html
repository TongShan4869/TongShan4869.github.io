<!DOCTYPE html>
<html>
<head>

<body>

<!-- 1. Deriving ABR from Naturalistic Sounds -->

    <line x1="0" y1="537" x2="1200" y2="537" stroke="#4EC5D4" stroke-width="0.5"/>

</svg>

<!-- 5. Temporal Integration in Children -->

  <rect width="1200" height="675" fill="#0a0a0a"/>
